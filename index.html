<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-ScareCrow Wiki & Downloads</title>
    <style>
        /* Gruvbox Dark Theme */
        body { 
            background-color: #282828; 
            color: #ebdbb2; 
            font-family: 'Consolas', 'JetBrains Mono', monospace; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }
        h1 { color: #fe8019; font-size: 2.5rem; margin-bottom: 10px; }
        h2 { color: #83a598; }
        p { color: #b8bb26; font-size: 1.1rem; max-width: 800px; margin: 10px auto; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .btn { 
            background-color: #fe8019; 
            color: #282828; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.2rem;
            display: inline-block; 
            margin: 15px 10px;
            transition: background-color 0.3s, transform 0.2s;
            border: 2px solid #fe8019;
        }
        .btn:hover { background-color: #d65d0e; border-color: #d65d0e; transform: translateY(-2px); }
        .btn-outline {
            background-color: transparent;
            color: #fe8019;
        }
        .btn-outline:hover {
            background-color: #fe8019;
            color: #282828;
        }
        img.banner { max-width: 100%; height: auto; border-radius: 15px; margin-top: 30px; }
        img.icon { max-width: 120px; border-radius: 20px; margin-bottom: 10px; }
        .links a { color: #83a598; text-decoration: none; margin: 0 10px; }
        .links a:hover { text-decoration: underline; color: #fe8019; }
        
        /* Mobile Compatibility */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .btn { width: 100%; box-sizing: border-box; margin: 10px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="Cyber-ScareCrow Icon" class="icon">
        <h1>Cyber-ScareCrow</h1>
        <p>100% Libre Offline Active-Analysis Defensive Suite.</p>
        
        <noscript>
            <p style="color: #fb4934; border: 1px solid #fb4934; padding: 10px;">JavaScript is disabled. Manual download links are provided below.</p>
        </noscript>

        <div id="download-section">
            <a href="https://github.com/tilas01/Cyber-ScareCrow-Server/releases/latest/download/Cyber-ScareCrow-Release.zip" id="download-btn" class="btn">Download Latest Release</a>
            <a href="https://github.com/tilas01/Cyber-ScareCrow" id="source-btn" class="btn btn-outline">Build from Source</a>
        </div>
        
        <div class="links" style="margin-top: 30px;">
            <a href="https://tilas01.github.io/Cyber-ScareCrow-Wiki">Documentation / Wiki</a> | 
            <a href="https://github.com/tilas01/Cyber-ScareCrow-Hub">Architecture Hub</a>
        </div>
        
        <br>
        <img src="banner.png" alt="Cyber-ScareCrow Banner" class="banner">
    </div>

    <script>
        const platform = navigator.platform.toLowerCase();
        const userAgent = navigator.userAgent.toLowerCase();
        const btn = document.getElementById('download-btn');
        const sourceBtn = document.getElementById('source-btn');
        
        if (platform.includes('win') || userAgent.includes('windows')) {
            btn.innerHTML = "Download for Windows (x64)";
        } else if (platform.includes('linux') || platform.includes('mac') || userAgent.includes('linux') || userAgent.includes('mac')) {
            btn.innerHTML = "Not Supported (Download Source)";
            btn.href = "https://github.com/tilas01/Cyber-ScareCrow";
            btn.classList.add("btn-outline");
            
            sourceBtn.innerHTML = "View Compilation Guide";
            sourceBtn.href = "https://tilas01.github.io/Cyber-ScareCrow-Wiki";
        }
    </script>
</body>
</html>
